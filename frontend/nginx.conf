worker_processes auto;
pid /tmp/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temp paths for unprivileged operation (no /var/run write needed).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Omit query strings from the access log (no API keys, tokens, or signatures logged).
    log_format scout '$remote_addr - [$time_local] "$request_method $uri $server_protocol" $status $body_bytes_sent';
    access_log /dev/stdout scout;

    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout 65;
    server_tokens  off;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;

        client_max_body_size 1m;

        # Pragmatic security headers, compatible with same-origin API and HTTP(S) presigned images.
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "SAMEORIGIN"                       always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        # img-src allows http: and https: for presigned MinIO/S3 originals that may use plain HTTP in dev.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' http: https: data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

        # Vite-hashed static assets: 1-year immutable cache.
        location ~* \.[a-f0-9]{8}\.(js|css|woff2?|svg|png|jpg|ico)$ {
            expires 365d;
            add_header Cache-Control "public, immutable" always;
        }

        # index.html: browsers must revalidate on every navigation.
        location = /index.html {
            expires 0;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # API proxy: strip /api prefix, preserve query and caching/range/streaming headers.
        location /api/ {
            proxy_pass http://api:8080/;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout   30s;
            proxy_send_timeout   30s;

            # Forward upstream caching, range, and streaming headers.
            proxy_pass_header ETag;
            proxy_pass_header Last-Modified;
            proxy_pass_header Accept-Ranges;
            proxy_pass_header Content-Range;
        }

        # SPA fallback: all unmatched paths serve index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
