name: scout

services:

  # ── Object storage ────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    # Listen on SCOUT_MINIO_API_PORT so the internal port matches the public port
    # that appears in presigned URLs (minio.localhost:<port>).
    command: >
      server /data
      --address :${SCOUT_MINIO_API_PORT:-9000}
      --console-address :${SCOUT_MINIO_CONSOLE_PORT:-9001}
    environment:
      MINIO_ROOT_USER:     ${SCOUT_S3_ACCESS_KEY:?SCOUT_S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${SCOUT_S3_SECRET_KEY:?SCOUT_S3_SECRET_KEY is required}
    ports:
      - "127.0.0.1:${SCOUT_MINIO_API_PORT:-9000}:${SCOUT_MINIO_API_PORT:-9000}"
      - "127.0.0.1:${SCOUT_MINIO_CONSOLE_PORT:-9001}:${SCOUT_MINIO_CONSOLE_PORT:-9001}"
    volumes:
      - minio-data:/data
    networks:
      scout-net:
        # minio.localhost resolves to this container inside the Compose network,
        # allowing the seed container to PUT presigned URLs that contain that hostname.
        # On the host, *.localhost resolves to 127.0.0.1 (RFC 6761) so the browser
        # can also reach minio.localhost:<SCOUT_MINIO_API_PORT>.
        aliases:
          - minio.localhost
    healthcheck:
      test: ["CMD-SHELL", "mc alias set scout-health http://localhost:${SCOUT_MINIO_API_PORT:-9000} \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" >/dev/null 2>&1 && mc ready scout-health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 100
    restart: unless-stopped
    stop_grace_period: 10s

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_ALIAS_URL:      http://minio:${SCOUT_MINIO_API_PORT:-9000}
      MC_ALIAS_USER:     ${SCOUT_S3_ACCESS_KEY:?SCOUT_S3_ACCESS_KEY is required}
      MC_ALIAS_PASSWORD: ${SCOUT_S3_SECRET_KEY:?SCOUT_S3_SECRET_KEY is required}
      SCOUT_S3_BUCKET:   ${SCOUT_S3_BUCKET:?SCOUT_S3_BUCKET is required}
    entrypoint: >
      /bin/sh -c "
        mc alias set local $${MC_ALIAS_URL} $${MC_ALIAS_USER} $${MC_ALIAS_PASSWORD} &&
        mc mb --ignore-existing local/$${SCOUT_S3_BUCKET}
      "
    networks:
      - scout-net
    restart: "no"

  # ── Data API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: scout-api:local
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      SCOUT_DATABASE_PATH:  /app/predictions.db
      SCOUT_API_KEY:        ${SCOUT_API_KEY:?SCOUT_API_KEY is required}
      SCOUT_HTTP_ADDR:      :8080
      SCOUT_CORS_ALLOWED_ORIGINS: http://localhost:${SCOUT_WEB_PORT:-8090}
      # Internal endpoint for bucket checks and object reads (never in presigned URLs).
      SCOUT_S3_ENDPOINT:        minio:${SCOUT_MINIO_API_PORT:-9000}
      # Public endpoint embedded in presigned URLs.
      # Both the browser (via *.localhost → 127.0.0.1) and the seed container
      # (via the minio.localhost network alias) resolve this hostname.
      SCOUT_S3_PUBLIC_ENDPOINT: minio.localhost:${SCOUT_MINIO_API_PORT:-9000}
      SCOUT_S3_PUBLIC_SECURE:   "false"
      SCOUT_S3_ACCESS_KEY:  ${SCOUT_S3_ACCESS_KEY:?SCOUT_S3_ACCESS_KEY is required}
      SCOUT_S3_SECRET_KEY:  ${SCOUT_S3_SECRET_KEY:?SCOUT_S3_SECRET_KEY is required}
      SCOUT_S3_BUCKET:      ${SCOUT_S3_BUCKET:?SCOUT_S3_BUCKET is required}
      SCOUT_S3_SECURE:      "false"
      SCOUT_S3_REGION:      ${SCOUT_S3_REGION:-us-east-1}
      SCOUT_THUMBNAIL_CACHE_DIR:       /var/cache/scout-thumbnails
      SCOUT_THUMBNAIL_CACHE_MAX_BYTES: ${SCOUT_THUMBNAIL_CACHE_MAX_BYTES:-268435456}
      SCOUT_THUMBNAIL_GENERATION_CONCURRENCY: "1"
      # Runtime bounds: single CPU, bounded heap.
      GOMAXPROCS: "1"
      GOMEMLIMIT: "200MiB"
    volumes:
      - type: bind
        source: ./dataset/predictions.db
        target: /app/predictions.db
        read_only: true
      - type: volume
        source: thumb-cache
        target: /var/cache/scout-thumbnails
    networks:
      - scout-net
    ports:
      # Loopback-only; normal users open the web URL instead.
      - "127.0.0.1:${SCOUT_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 100
    restart: unless-stopped
    stop_grace_period: 15s

  # ── Web frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # DEMO LIMITATION: this key is a build arg and ends up visible in the
        # browser bundle. It is a static single-key auth scheme for demo use only.
        VITE_SCOUT_API_KEY: ${SCOUT_API_KEY:?SCOUT_API_KEY is required}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scout-net
    ports:
      - "127.0.0.1:${SCOUT_WEB_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    user: "101:101"
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped
    stop_grace_period: 5s

  # ── Seed (run with: docker compose --profile seed up seed) ───────────────
  seed:
    image: scout-api:local
    entrypoint: ["scout-seed"]
    profiles: ["seed"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      SCOUT_SEED_API_URL:    http://api:8080
      SCOUT_API_KEY:         ${SCOUT_API_KEY:?SCOUT_API_KEY is required}
      SCOUT_SEED_IMAGES_DIR: /dataset/images
      SCOUT_SEED_CONCURRENCY: "${SCOUT_SEED_CONCURRENCY:-2}"
    volumes:
      - type: bind
        source: ./dataset/images
        target: /dataset/images
        read_only: true
    networks:
      - scout-net
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: "0.5"
    pids_limit: 50
    restart: "no"

networks:
  scout-net:

volumes:
  minio-data:
  thumb-cache:
