name: Integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Integration (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            uname: x86_64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            uname: aarch64
    env:
      # Dev-only credentials — safe to commit; never use in production.
      SCOUT_S3_ACCESS_KEY: scout-dev-access
      SCOUT_S3_SECRET_KEY: scout-dev-secret-key-change-me
      SCOUT_API_KEY: scout-dev-api-key-do-not-use-in-production
      SCOUT_S3_BUCKET: scout-photos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Assert runner architecture
        run: |
          ACTUAL=$(uname -m)
          echo "uname -m: $ACTUAL"
          docker info --format 'Docker Architecture: {{.Architecture}}'
          if [ "$ACTUAL" != "${{ matrix.uname }}" ]; then
            echo "ERROR: expected ${{ matrix.uname }}, got $ACTUAL" >&2
            exit 1
          fi

      - name: Validate Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Assert image architectures
        run: |
          EXPECTED=$(echo "${{ matrix.platform }}" | cut -d/ -f2)
          API_ARCH=$(docker image inspect scout-api:local --format '{{.Architecture}}')
          WEB_ARCH=$(docker image inspect scout-web:local --format '{{.Architecture}}')
          echo "Expected: $EXPECTED  scout-api:local: $API_ARCH  scout-web:local: $WEB_ARCH"
          [ "$API_ARCH" = "$EXPECTED" ] || { echo "ERROR: scout-api arch mismatch" >&2; exit 1; }
          [ "$WEB_ARCH" = "$EXPECTED" ] || { echo "ERROR: scout-web arch mismatch" >&2; exit 1; }

      - name: Start services and wait for healthy
        run: docker compose up -d --wait --wait-timeout 120

      - name: Smoke check – frontend, healthz, metrics
        run: |
          curl -fsS http://127.0.0.1:8090/ -o /dev/null
          curl -fsS http://127.0.0.1:8080/healthz -o /dev/null
          curl -fsS http://127.0.0.1:8080/metrics -o /dev/null

      - name: Seed – first run
        run: docker compose --profile seed run --rm seed

      - name: Seed – second run (idempotency check)
        run: docker compose --profile seed run --rm seed

      - name: Integration tests
        run: |
          cd backend
          SCOUT_API_URL=http://127.0.0.1:8080 \
          SCOUT_API_KEY=scout-dev-api-key-do-not-use-in-production \
          SCOUT_DATASET_DIR="$PWD/../dataset/images" \
          go test -race -tags integration ./integration

      - name: Dump service state on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down --volumes
