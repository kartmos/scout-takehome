name: scout

# Production topology: API + web only.
# Object storage is external (AWS S3, Cloudflare R2, or self-hosted MinIO).
# MinIO is NOT included; set SCOUT_S3_* externally.
#
# Usage:
#   docker compose -f compose.production.yaml up -d
#
# Required environment variables (no defaults, must be supplied):
#   SCOUT_API_KEY, SCOUT_S3_ENDPOINT, SCOUT_S3_ACCESS_KEY, SCOUT_S3_SECRET_KEY,
#   SCOUT_S3_BUCKET, SCOUT_S3_SECURE, SCOUT_S3_REGION
# Optional:
#   SCOUT_S3_PUBLIC_ENDPOINT, SCOUT_S3_PUBLIC_SECURE  (if presigned hostname differs)
#   SCOUT_WEB_PORT (default 8090), SCOUT_API_PORT (default 8080)
#   SCOUT_WEB_BIND_ADDR (default 127.0.0.1) — the `web` port binds to loopback
#   only by default, so this topology expects a reverse proxy or load balancer
#   on the same host (or a port-forward from elsewhere) in front of it. Set
#   SCOUT_WEB_BIND_ADDR=0.0.0.0 only if you intend to expose `web` directly to
#   the network with no TLS-terminating proxy in front of it.

services:

  api:
    image: ${SCOUT_API_IMAGE:-scout-api:0.1.0}
    environment:
      SCOUT_DATABASE_PATH:  /app/predictions.db
      SCOUT_API_KEY:        ${SCOUT_API_KEY:?SCOUT_API_KEY is required}
      SCOUT_HTTP_ADDR:      :8080
      SCOUT_CORS_ALLOWED_ORIGINS: ${SCOUT_CORS_ALLOWED_ORIGINS:?SCOUT_CORS_ALLOWED_ORIGINS is required}
      SCOUT_S3_ENDPOINT:    ${SCOUT_S3_ENDPOINT:?SCOUT_S3_ENDPOINT is required}
      SCOUT_S3_PUBLIC_ENDPOINT: ${SCOUT_S3_PUBLIC_ENDPOINT:-}
      SCOUT_S3_PUBLIC_SECURE:   ${SCOUT_S3_PUBLIC_SECURE:-}
      SCOUT_S3_ACCESS_KEY:  ${SCOUT_S3_ACCESS_KEY:?SCOUT_S3_ACCESS_KEY is required}
      SCOUT_S3_SECRET_KEY:  ${SCOUT_S3_SECRET_KEY:?SCOUT_S3_SECRET_KEY is required}
      SCOUT_S3_BUCKET:      ${SCOUT_S3_BUCKET:?SCOUT_S3_BUCKET is required}
      SCOUT_S3_SECURE:      ${SCOUT_S3_SECURE:?SCOUT_S3_SECURE is required}
      SCOUT_S3_REGION:      ${SCOUT_S3_REGION:?SCOUT_S3_REGION is required}
      SCOUT_THUMBNAIL_CACHE_DIR:       /var/cache/scout-thumbnails
      # Disk-only byte budget; does not consume container RAM.
      SCOUT_THUMBNAIL_CACHE_MAX_BYTES: ${SCOUT_THUMBNAIL_CACHE_MAX_BYTES:-268435456}
      SCOUT_THUMBNAIL_GENERATION_CONCURRENCY: "1"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "320MiB"
    volumes:
      - type: bind
        source: ${SCOUT_DATABASE_PATH:-./dataset/predictions.db}
        target: /app/predictions.db
        read_only: true
      - type: volume
        source: thumb-cache
        target: /var/cache/scout-thumbnails
    ports:
      - "127.0.0.1:${SCOUT_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    # ~0.75 CPU / 384 MiB — fits the documented 512–640 MiB combined ceiling.
    mem_limit: 384m
    cpus: "0.75"
    pids_limit: 100
    restart: unless-stopped
    stop_grace_period: 15s

  web:
    image: ${SCOUT_WEB_IMAGE:-scout-web:0.1.0}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${SCOUT_WEB_BIND_ADDR:-127.0.0.1}:${SCOUT_WEB_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    user: "101:101"
    security_opt:
      - no-new-privileges:true
    # ~0.25 CPU / 64 MiB — nginx serving static files is lightweight.
    mem_limit: 64m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped
    stop_grace_period: 5s

volumes:
  thumb-cache:
