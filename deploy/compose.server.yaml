name: scout-server

# Production single-server topology for a rented VPS: Caddy is the only
# publicly reachable service; it terminates TLS and reverse-proxies to the
# existing `web` container (unprivileged Nginx + React), which proxies
# `/api/` to the `api` container (Go). External object storage is not part
# of this Compose project — see README.md "Deploy to a VPS with Caddy and
# GHCR" and deploystepbystep.md for the full operator procedure.
#
# This is a complete, standalone production topology (not an override of
# compose.production.yaml): api/web publish no host ports here, unlike
# compose.production.yaml's debug-friendly loopback bindings.
#
# Usage (from /opt/scout on the server):
#   docker compose -f compose.server.yaml --env-file .env.production config
#   docker compose -f compose.server.yaml --env-file .env.production up -d
#
# Required variables (no defaults; Compose fails fast if any is missing):
#   SCOUT_DOMAIN, SCOUT_ACME_EMAIL, SCOUT_API_IMAGE, SCOUT_WEB_IMAGE,
#   SCOUT_IMAGE_TAG, SCOUT_DATABASE_PATH, SCOUT_API_KEY,
#   SCOUT_CORS_ALLOWED_ORIGINS, SCOUT_S3_ENDPOINT, SCOUT_S3_ACCESS_KEY,
#   SCOUT_S3_SECRET_KEY, SCOUT_S3_BUCKET, SCOUT_S3_SECURE, SCOUT_S3_REGION
# Optional:
#   SCOUT_S3_PUBLIC_ENDPOINT, SCOUT_S3_PUBLIC_SECURE,
#   SCOUT_THUMBNAIL_CACHE_MAX_BYTES (default 268435456)

services:

  # ── Data API (private) ────────────────────────────────────────────────────
  api:
    image: ${SCOUT_API_IMAGE:?SCOUT_API_IMAGE is required}:${SCOUT_IMAGE_TAG:?SCOUT_IMAGE_TAG is required}
    environment:
      SCOUT_DATABASE_PATH:  /app/predictions.db
      SCOUT_API_KEY:        ${SCOUT_API_KEY:?SCOUT_API_KEY is required}
      SCOUT_HTTP_ADDR:      :8080
      SCOUT_CORS_ALLOWED_ORIGINS: ${SCOUT_CORS_ALLOWED_ORIGINS:?SCOUT_CORS_ALLOWED_ORIGINS is required}
      SCOUT_S3_ENDPOINT:    ${SCOUT_S3_ENDPOINT:?SCOUT_S3_ENDPOINT is required}
      SCOUT_S3_PUBLIC_ENDPOINT: ${SCOUT_S3_PUBLIC_ENDPOINT:-}
      SCOUT_S3_PUBLIC_SECURE:   ${SCOUT_S3_PUBLIC_SECURE:-}
      SCOUT_S3_ACCESS_KEY:  ${SCOUT_S3_ACCESS_KEY:?SCOUT_S3_ACCESS_KEY is required}
      SCOUT_S3_SECRET_KEY:  ${SCOUT_S3_SECRET_KEY:?SCOUT_S3_SECRET_KEY is required}
      SCOUT_S3_BUCKET:      ${SCOUT_S3_BUCKET:?SCOUT_S3_BUCKET is required}
      SCOUT_S3_SECURE:      ${SCOUT_S3_SECURE:?SCOUT_S3_SECURE is required}
      SCOUT_S3_REGION:      ${SCOUT_S3_REGION:?SCOUT_S3_REGION is required}
      SCOUT_THUMBNAIL_CACHE_DIR:       /var/cache/scout-thumbnails
      SCOUT_THUMBNAIL_CACHE_MAX_BYTES: ${SCOUT_THUMBNAIL_CACHE_MAX_BYTES:-268435456}
      SCOUT_THUMBNAIL_GENERATION_CONCURRENCY: "1"
      # Runtime bounds: single CPU, bounded heap (leaves native/runtime
      # headroom below the 384m container limit).
      GOMAXPROCS: "1"
      GOMEMLIMIT: "320MiB"
    volumes:
      - type: bind
        source: ${SCOUT_DATABASE_PATH:?SCOUT_DATABASE_PATH is required}
        target: /app/predictions.db
        read_only: true
      - type: volume
        source: thumb-cache
        target: /var/cache/scout-thumbnails
    networks:
      - scout-internal
    # No `ports:` — reachable only from other containers on scout-internal.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    # ~0.75 CPU / 384 MiB, matching compose.production.yaml.
    mem_limit: 384m
    cpus: "0.75"
    pids_limit: 100
    restart: unless-stopped
    stop_grace_period: 15s

  # ── Web (private; React served by unprivileged Nginx) ────────────────────
  web:
    image: ${SCOUT_WEB_IMAGE:?SCOUT_WEB_IMAGE is required}:${SCOUT_IMAGE_TAG:?SCOUT_IMAGE_TAG is required}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scout-internal
    # No `ports:` — Caddy reaches it as "web:8080" on scout-internal only.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    user: "101:101"
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped
    stop_grace_period: 5s

  # ── Caddy (only public service) ───────────────────────────────────────────
  caddy:
    image: caddy:2.9.1-alpine
    depends_on:
      web:
        condition: service_healthy
    environment:
      SCOUT_DOMAIN:     ${SCOUT_DOMAIN:?SCOUT_DOMAIN is required}
      SCOUT_ACME_EMAIL: ${SCOUT_ACME_EMAIL:?SCOUT_ACME_EMAIL is required}
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
      - type: volume
        source: caddy-data
        target: /data
      - type: volume
        source: caddy-config
        target: /config
    networks:
      - scout-internal
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      # Hits the admin API, which is bound to the container's own loopback
      # (see deploy/Caddyfile) and never published as a Compose port.
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    # The official Caddy image runs as root so it can bind ports 80/443;
    # CAP_NET_BIND_SERVICE is the only capability that grants, so every
    # other Linux capability is dropped.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    # Small documented allowance: reverse-proxying static/JSON traffic for
    # one small application is not CPU/PID intensive.
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped
    stop_grace_period: 10s

  # ── One-shot seed (docker compose --profile seed run --rm seed) ─────────
  # Reuses the api image's scout-seed binary. Absent from steady-state
  # resource use; run only on explicit command against the private API
  # address. See deploystepbystep.md section 7.9 for upload/verify steps.
  seed:
    image: ${SCOUT_API_IMAGE:?SCOUT_API_IMAGE is required}:${SCOUT_IMAGE_TAG:?SCOUT_IMAGE_TAG is required}
    entrypoint: ["scout-seed"]
    profiles: ["seed"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      SCOUT_SEED_API_URL:    http://api:8080
      SCOUT_API_KEY:         ${SCOUT_API_KEY:?SCOUT_API_KEY is required}
      SCOUT_SEED_IMAGES_DIR: /opt/scout/data/images
      SCOUT_SEED_CONCURRENCY: "${SCOUT_SEED_CONCURRENCY:-2}"
    volumes:
      - type: bind
        source: /opt/scout/data/images
        target: /opt/scout/data/images
        read_only: true
    networks:
      - scout-internal
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: "0.5"
    pids_limit: 50
    restart: "no"

networks:
  scout-internal:

volumes:
  thumb-cache:
  caddy-data:
  caddy-config:
